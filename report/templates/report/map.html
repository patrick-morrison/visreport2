{% extends 'report/base.html' %}
{% block content %}

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
        integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
        crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
        integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
        crossorigin=""></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"
        charset="utf-8"></script>
</head>

<style>
    html {
        height: 100%;
    }

    body {
        height: calc(100% - 56px);
    }

    body > footer {
        display: none;
    }

    #map {
        height: 100%;
    }

    .leaflet-tooltip-pane .label {
        color: white;
        font-weight: bolder;
        font-style: italic;
        background: transparent;
        border: 0;
        box-shadow: none;
        font-size: 1.1em font-family: "Arial Narrow", sans-serif;
    }

    .leaflet-popup-tip,
    .leaflet-popup-content-wrapper {
        background: #292b2c;
        color: white;
        font-size: 1.3em;
        border-right: 15px solid transparent;
    }

    .legend {
        padding: 3px 3px;
        font: 12px Arial, Helvetica, sans-serif;
        background: white;
        background: rgba(255, 255, 255, 0.3);
        /*box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);*/
        /*border-radius: 5px;*/
        line-height: 22px;
        color: #292b2c;
    }

    .legend h4 {
        text-align: left;
        font-size: 14px;
        margin: 2px 3px 3px;
        color: #292b2c;
    }

    .legend span {
        position: relative;
        bottom: 3px;
    }

    .legend i {
        width: 18px;
        height: 18px;
        float: left;
        margin: 0 8px 0 0;
        opacity: 0.9;
    }

    .legend i.icon {
        background-size: 18px;
        background-color: rgba(255, 255, 255, 1);
    }
</style>
<div id="map"></div>
<button id="map-cb-btn" onclick="toggleMapColorblind()" style="position:fixed; top:70px; right:10px; z-index:1000;" class="btn btn-light btn-sm" style="font-size:0.8rem;">◐ Colours</button>
<div style="position: fixed; bottom: 20px; right: 12px; z-index: 1000; font-size: 0.75rem; color: rgba(50,50,50,0.7); text-shadow: 0 1px 2px rgba(255,255,255,0.5); pointer-events: auto; white-space: nowrap;">
    Vis.Report by <a href="https://padmorrison.com" target="_blank" rel="noopener noreferrer" style="color: rgba(50,50,50,0.7); text-decoration: none;">Patrick Morrison</a>
</div>

<script>
    var map = L.map('map', {
        tap: false,
        renderer: L.canvas({ tolerance: 9 })
    }).setView([-32.00,115.64], 10);
    var voyagerTile  = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var positronTile = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
    var tileAttrib = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>';
    var normalColors = { bad: '#d9534f', marginal: '#f0ad4e', good: '#5cb85c', great: '#0275d8', none: '#868e96' };
    var cbColors     = { bad: '#CC3311', marginal: '#EE7733', good: '#33BBEE', great: '#0077BB', none: '#868e96' };
    var mapCbMode = localStorage.getItem('visreport-colorblind') === '1';

    var baseLayer = L.tileLayer(mapCbMode ? positronTile : voyagerTile, {
        attribution: tileAttrib,
        subdomains: 'abcd',
        maxZoom: 17
    }).addTo(map);

    function getColors() { return mapCbMode ? cbColors : normalColors; }

    function getColor(v) {
        var c = getColors();
        return v > 15.9 ? c.great :
            v > 7.9 ? c.good :
                v > 2.9 ? c.marginal :
                    v > -0.1 ? c.bad :
                        c.none;
    }

    var legend = L.control({ position: "bottomleft" });
    legend.onAdd = function (map) {
        var div = L.DomUtil.create("div", "legend");
        div._legendDiv = true;
        return div;
    };
    legend.addTo(map);

    function updateLegend() {
        var c = getColors();
        var div = document.querySelector('.legend');
        if (!div) return;
        div.innerHTML = '';
        div.innerHTML += '<i style="background:' + c.bad      + '"></i><span>&lt; 3 m</span><br>';
        div.innerHTML += '<i style="background:' + c.marginal + '"></i><span>3-8m</span><br>';
        div.innerHTML += '<i style="background:' + c.good     + '"></i><span>8-15m</span><br>';
        div.innerHTML += '<i style="background:' + c.great    + '"></i><span>15-25m</span><br>';
        div.innerHTML += '<i style="background:' + c.none     + '"></i><span>No recent</span><br>';
    }
    updateLegend();

    function toggleMapColorblind() {
        mapCbMode = !mapCbMode;
        localStorage.setItem('visreport-colorblind', mapCbMode ? '1' : '0');
        map.removeLayer(baseLayer);
        baseLayer = L.tileLayer(mapCbMode ? positronTile : voyagerTile, {
            attribution: tileAttrib, subdomains: 'abcd', maxZoom: 17
        }).addTo(map);
        baseLayer.bringToBack();
        updateLegend();
        document.getElementById('map-cb-btn').textContent = mapCbMode ? '◐ Colourblind' : '◐ Colours';
        sites.eachLayer(function(layer) {
            var v = layer.feature.properties.last_report.visibility;
            var recent = layer.feature.properties.last_report.recent == 'True';
            layer.setStyle({ fillColor: getColor(v), color: recent ? 'white' : '#000' });
        });
    }

    function geojsonMarkerOptions(feature) {
        if (feature.properties.last_report.recent == 'True') {
            return {
                radius: 16,
                fillColor: getColor(feature.properties.last_report.visibility),
                color: "white",
                weight: 0,
                opacity: .9,
                fillOpacity: 1,
            };
        } else {
            return {
                radius: 16,
                fillColor: getColor(feature.properties.last_report.visibility),
                color: "#000",
                weight: 1,
                opacity: 0.1,
                fillOpacity: 0.3,
            };
        }
    }

    function visText(report) {
        if (report.recent != 'None') {
            return "<span style = 'color:" + getColor(report.visibility) + ";'>" +
                "<u>" + report.since + "</u></br>" +
                report.visibility + "m" +  " reported  by @" + report.username + "</span>"
        } else {
            return "<p> No recent reports.</p>"
        }
    }

    function popupText(layer) {
        return "<a style='line-height: .6; color:white; text-decoration: none;' href ='" + layer.feature.id + "'>" +
            "<h5><i>" + layer.feature.properties.name + "</i></h5>" +
            visText(layer.feature.properties.last_report) +
            "<p style = 'color:#777d80'><small>Click here for more.</small></p></a>"
    }

    var sites = new L.geoJSON("", {
        pointToLayer: function (feature, latlng) {
            return L.circleMarker(latlng, geojsonMarkerOptions(feature));
    }, onEachFeature: function (feature, layer) {
        layer.bindPopup(popupText,{ maxWidth: 230, className: 'text', closeOnClick: true, closeButton: false, direction: 'top',});
        layer.bindTooltip(function (layer) {return layer.feature.id;},{direction: 'center', className: 'label', permanent: 'true'} );
        layer.on("click", function () {
            if (window.trackNavigation) {
                window.trackNavigation("map_marker_click", {
                    page: window.location.pathname,
                    site: feature.id
                });
            }
        });
        layer.on("popupopen", function () {
            if (window.trackNavigation) {
                window.trackNavigation("map_popup_open", {
                    page: window.location.pathname,
                    site: feature.id
                });
            }
        });
    }});

    sites.addTo(map);

    // Apply saved colorblind state to button label
    if (mapCbMode) document.getElementById('map-cb-btn').textContent = '◐ Colourblind';
    L.control.locate({
        locateOptions: {
            maxZoom: 10,
            enableHighAccuracy: false
        }
    }).addTo(map);

    $.ajax({
        dataType: "json",
        url: "{% url 'sites_display_geojson'%}",
        success: function (data) {
            $(data.features).each(function (key, data) {
                sites.addData(data);
            });
        }
    }).error(function () { });

    sites.on("data:loaded",function(){
      map.openTooltip();
});

</script>

{% endblock %}
